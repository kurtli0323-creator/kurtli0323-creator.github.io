<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商禾外贸报价管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #409eff 0%, #45a049 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: bold;
        }
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .tab {
            padding: 15px 25px;
            cursor: pointer;
            background: #f8f9fa;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab.active {
            background: #409eff;
            color: white;
        }
        .content {
            padding: 25px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #e9ecef;
        }
        h2, h3, h4 {
            margin: 15px 0 10px 0;
            color: #333;
            border-left: 4px solid #409eff;
            padding-left: 12px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #444;
            font-weight: 500;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #409eff;
        }
        .whp-input {
            display: flex;
            gap: 10px;
        }
        .whp-input input {
            flex: 1;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #409eff;
            color: #fff;
            margin: 5px 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 80px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(64, 158, 255, 0.3);
        }
        .btn-success {
            background: #67c23a;
        }
        .btn-warning {
            background: #ff9500;
        }
        .btn-danger {
            background: #f56c6c;
        }
        .btn-primary {
            background: #409eff;
        }
        .btn-secondary {
            background: #909399;
        }
        .product-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            font-size: 14px;
        }
        .product-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .weight-info {
            background: #eef7ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            border-left: 4px solid #409eff;
        }
        .calc-process {
            background: #fff5e5;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            border-left: 4px solid #ff9500;
        }
        .quote-result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            border-left: 4px solid #67c23a;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #67c23a;
        }
        .status-dot.offline {
            background: #f56c6c;
        }
        .sync-btn {
            background: #9b59b6 !important;
        }
        .sync-btn:hover {
            background: #8e44ad !important;
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3) !important;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1001;
            animation: slideIn 0.3s;
        }
        .notification.success { background: #67c23a; }
        .notification.error { background: #f56c6c; }
        .notification.info { background: #409eff; }
        .notification.warn { background: #ff9500; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .floating-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #409eff;
            color: white;
            border: none;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s;
        }
        .floating-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(64, 158, 255, 0.4);
        }
        /* 资料管理新增样式 */
        .file-upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            background: #fafafa;
            transition: border-color 0.3s;
        }
        .file-upload-area:hover {
            border-color: #409eff;
        }
        .file-upload-area.drag-over {
            border-color: #409eff;
            background: #f0f8ff;
        }
        .file-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .file-preview {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-icon {
            font-size: 24px;
        }
        .file-info {
            flex: 1;
        }
        .file-name {
            font-weight: 500;
            color: #333;
        }
        .file-meta {
            font-size: 12px;
            color: #999;
        }
        /* 历史记录样式 */
        .history-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
        }
        .history-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .history-time {
            font-size: 12px;
            color: #999;
        }
        .history-action {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .action-create { background: #e8f5e8; color: #2e7d32; }
        .action-update { background: #fff8e1; color: #f57f17; }
        .action-delete { background: #ffebee; color: #c62828; }
        .history-data {
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }
        /* 登录页面样式 */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .login-form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .login-form h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .login-form .form-group {
            margin-bottom: 15px;
        }
        .login-form .btn {
            width: 100%;
            margin: 10px 0;
        }
        .login-error {
            color: #f56c6c;
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            .content {
                padding: 15px;
            }
            .whp-input {
                flex-direction: column;
                gap: 10px;
            }
            .btn {
                padding: 10px 15px;
                font-size: 13px;
                min-width: 60px;
            }
            .header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-container">
        <div class="login-form">
            <h2>商禾外贸报价系统</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn btn-success" onclick="login()">登录</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <div class="container">
            <div class="header">
                <h1>商禾外贸报价管理系统</h1>
                <div>
                    <button class="btn sync-btn" onclick="syncData()" title="同步数据">🔄 同步</button>
                    <button class="btn" onclick="showSettings()" title="设置">⚙️ 设置</button>
                    <button class="btn btn-danger" onclick="logout()" title="退出登录">🚪 退出</button>
                </div>
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="product">产品管理</button>
                <button class="tab" data-tab="quote">报价计算</button>
                <button class="tab" data-tab="files">产品资料</button>
                <button class="tab" data-tab="history">历史记录</button>
            </div>
            
            <div class="content">
                <!-- 产品管理标签页 -->
                <div id="product" class="tab-content active">
                    <div class="card">
                        <h3>新增产品</h3>
                        <div class="form-group"><label>产品型号</label><input id="model"></div>
                        <h4>包装1</h4>
                        <div class="form-group"><label>长 宽 高 (cm)</label><div class="whp-input"><input id="l1" placeholder="长" oninput="autoCalc()"><input id="w1" placeholder="宽" oninput="autoCalc()"><input id="h1" placeholder="高" oninput="autoCalc()"></div></div>
                        <div class="form-group"><label>实重1 (kg)</label><input id="weight1" oninput="autoCalc()"></div>
                        <h4>包装2</h4>
                        <div class="form-group"><label>长 宽 高 (cm)</label><div class="whp-input"><input id="l2" placeholder="长" oninput="autoCalc()"><input id="w2" placeholder="宽" oninput="autoCalc()"><input id="h2" placeholder="高" oninput="autoCalc()"></div></div>
                        <div class="form-group"><label>实重2 (kg)</label><input id="weight2" oninput="autoCalc()"></div>
                        <div class="form-group"><label>英文介绍</label><textarea id="intro" rows="3" placeholder="产品英文描述..."></textarea></div>
                        <div class="weight-info" id="autoInfo">包装1抛重 / CBM：待输入</div>
                        <button class="btn btn-success" onclick="saveProduct()">💾 保存产品</button>
                    </div>
                    
                    <div class="card">
                        <h3>产品列表</h3>
                        <div id="productList" class="product-list"></div>
                    </div>
                </div>

                <!-- 报价计算标签页 -->
                <div id="quote" class="tab-content">
                    <div class="card">
                        <h3>报价计算</h3>
                        <div class="form-group"><label>产品型号</label><select id="selModel" onchange="calTotalWeight()"></select></div>
                        <div class="form-group"><label>采购数量</label><input id="qty" type="number" value="1" onchange="calTotalWeight()"></div>
                        <div class="form-group"><label>产品单价 (USD)</label><input id="unitPrice"></div>
                        <div class="form-group"><label style="color:#1677ff" id="totalWeightTip">总重量：0 kg</label></div>
                        <div class="form-group"><label>运费单价 (元/kg)</label><input id="freightUnit"></div>
                        <div class="form-group"><label>超长费 (元)</label><input id="overFee"></div>
                        <div class="form-group"><label>偏远费 (元)</label><input id="remoteFee"></div>
                        <div class="form-group"><label>报关费 (元)</label><input id="customFee"></div>
                        <div class="form-group"><label>运输方式</label><select id="shipMethod"><option value="ocean">海派</option><option value="air">空派</option><option value="express">快递</option></select></div>
                        <div class="form-group"><label>运输时间</label><input id="shipTime"></div>
                        <button class="btn btn-success" onclick="makeQuote()">📊 生成报价</button>
                        <button class="btn btn-warning" onclick="copyQuote()">📋 复制报价</button>
                        <div class="calc-process" id="calcProcess">计算过程</div>
                        <h3>英文报价单</h3>
                        <div class="quote-result" id="quoteResult">请生成报价</div>
                    </div>
                </div>

                <!-- 产品资料标签页 -->
                <div id="files" class="tab-content">
                    <div class="card">
                        <h3>产品资料管理</h3>
                        <div class="form-group">
                            <label>选择产品</label>
                            <select id="selFileProduct" onchange="loadProductFiles()">
                                <option value="">请选择产品</option>
                            </select>
                        </div>
                        
                        <div id="fileUploadSection" style="display:none;">
                            <div class="file-upload-area" id="dropZone">
                                <p>拖拽文件到这里或点击下方按钮上传</p>
                                <p style="font-size: 12px; color: #999; margin-top: 10px;">支持图片、PDF、Word、Excel等文件格式</p>
                                <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileSelect(event)">
                                <button class="btn" onclick="document.getElementById('fileInput').click()">📁 选择文件</button>
                            </div>
                            
                            <div class="card">
                                <h4>文件列表</h4>
                                <div id="fileList" class="file-list"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 历史记录标签页 -->
                <div id="history" class="tab-content">
                    <div class="card">
                        <h3>历史记录</h3>
                        <div class="form-group">
                            <label>筛选条件</label>
                            <div class="whp-input">
                                <select id="historyFilterType">
                                    <option value="">全部操作</option>
                                    <option value="create">创建</option>
                                    <option value="update">更新</option>
                                    <option value="delete">删除</option>
                                </select>
                                <select id="historyFilterProduct" onchange="filterHistory()">
                                    <option value="">全部产品</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="card">
                            <h4>操作记录</h4>
                            <div id="historyList" class="history-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">在线</span>
            </div>
            <div id="lastSyncTime">刚刚同步</div>
            <div id="dataCount">产品数量: 0</div>
        </div>

        <button class="floating-btn" onclick="scrollToTop()">↑</button>
    </div>

    <script>
        // 应用配置
        const APP_CONFIG = {
            version: '4.0.0',
            storageKey: 'shanghe_products_v4',
            fileStorageKey: 'shanghe_product_files_v1',
            historyStorageKey: 'shanghe_history_v1',
            userStorageKey: 'shanghe_user',
            syncUrl: 'https://your-sync-server.com/api/sync', // 替换为您的同步服务器地址
            authUrl: 'https://your-auth-server.com/api/auth',
            syncInterval: 300000, // 5分钟同步一次
            mockSync: true, // 模拟同步，实际使用时设为false
            maxFileSize: 10 * 1024 * 1024, // 10MB
            allowedFileTypes: ['image/*', '.pdf', '.doc', '.docx', '.xls', '.xlsx', '.ppt', '.pptx']
        };

        // 数据模型
        let products = [];
        let productFiles = {}; // 存储文件信息
        let historyRecords = []; // 存储历史记录
        let currentUser = null;
        let isOnline = true;
        let lastSyncTime = new Date();
        let syncInProgress = false;

        // 初始化应用
        function initApp() {
            // 检查是否已登录
            const savedUser = localStorage.getItem(APP_CONFIG.userStorageKey);
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    showMainApp();
                } catch (e) {
                    showLoginPage();
                }
            } else {
                showLoginPage();
            }
        }

        // 显示登录页面
        function showLoginPage() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }

        // 显示主应用
        function showMainApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            loadLocalData();
            updateConnectionStatus();
            updateDataCount();
            renderList();
            renderSel();
            
            // 初始化资料管理
            renderFileProductSelector();
            
            // 初始化历史记录
            renderHistoryProductSelector();
            renderHistoryList();
            
            // 设置定期同步
            setInterval(syncData, APP_CONFIG.syncInterval);
            
            // 盿听网络状态变化
            window.addEventListener('online', handleNetworkChange);
            window.addEventListener('offline', handleNetworkChange);
            
            // 设置标签切换
            setupTabSwitching();
            
            // 设置文件拖拽上传
            setupFileDragDrop();
        }

        // 登录
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }
            
            try {
                // 模拟登录请求
                if (APP_CONFIG.mockSync) {
                    // 模拟认证成功
                    currentUser = { username, id: 'mock_user_id' };
                    localStorage.setItem(APP_CONFIG.userStorageKey, JSON.stringify(currentUser));
                    showMainApp();
                    showNotification('登录成功');
                } else {
                    // 实际认证请求
                    const response = await fetch(APP_CONFIG.authUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username,
                            password
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success) {
                            currentUser = { username, id: result.userId };
                            localStorage.setItem(APP_CONFIG.userStorageKey, JSON.stringify(currentUser));
                            showMainApp();
                            showNotification('登录成功');
                        } else {
                            showError(result.message || '登录失败');
                        }
                    } else {
                        throw new Error('认证服务器错误');
                    }
                }
            } catch (error) {
                console.error('登录失败:', error);
                showError('登录失败，请检查网络连接');
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem(APP_CONFIG.userStorageKey);
                currentUser = null;
                showLoginPage();
                showNotification('已退出登录');
            }
        }

        // 设置标签切换
        function setupTabSwitching() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                    
                    if (tab.dataset.tab === 'quote') {
                        renderSel();
                        calTotalWeight();
                    } else if (tab.dataset.tab === 'files') {
                        renderFileProductSelector();
                    } else if (tab.dataset.tab === 'history') {
                        renderHistoryProductSelector();
                        renderHistoryList();
                    }
                });
            });
        }

        // 加载本地数据
        function loadLocalData() {
            try {
                // 加载产品数据
                const stored = localStorage.getItem(APP_CONFIG.storageKey);
                if (stored) {
                    products = JSON.parse(stored);
                }
                
                // 加载文件数据
                const storedFiles = localStorage.getItem(APP_CONFIG.fileStorageKey);
                if (storedFiles) {
                    productFiles = JSON.parse(storedFiles);
                }
                
                // 加载历史记录
                const storedHistory = localStorage.getItem(APP_CONFIG.historyStorageKey);
                if (storedHistory) {
                    historyRecords = JSON.parse(storedHistory);
                }
            } catch (e) {
                console.error('加载本地数据失败:', e);
                products = [];
                productFiles = {};
                historyRecords = [];
                showNotification('本地数据损坏，已清空', 'error');
            }
        }

        // 保存本地数据
        function saveLocalData() {
            try {
                localStorage.setItem(APP_CONFIG.storageKey, JSON.stringify(products));
                localStorage.setItem(APP_CONFIG.fileStorageKey, JSON.stringify(productFiles));
                localStorage.setItem(APP_CONFIG.historyStorageKey, JSON.stringify(historyRecords));
                updateDataCount();
            } catch (e) {
                console.error('保存本地数据失败:', e);
                showNotification('保存失败', 'error');
            }
        }

        // 更新数据统计
        function updateDataCount() {
            document.getElementById('dataCount').textContent = `产品数量: ${products.length}`;
        }

        // 记录历史操作
        function recordHistory(action, productData, additionalInfo = {}) {
            const record = {
                id: Date.now() + Math.random(),
                action: action,
                timestamp: new Date().toISOString(),
                productData: JSON.parse(JSON.stringify(productData)), // 深拷贝
                userId: currentUser.id,
                ...additionalInfo
            };
            historyRecords.unshift(record);
            
            // 限制历史记录数量，最多保留1000条
            if (historyRecords.length > 1000) {
                historyRecords = historyRecords.slice(0, 1000);
            }
            
            saveLocalData();
        }

        // 处理网络状态变化
        function handleNetworkChange() {
            isOnline = navigator.onLine;
            updateConnectionStatus();
            if (isOnline) {
                showNotification('网络已连接', 'info');
                // 网络恢复后自动同步
                setTimeout(syncData, 2000);
            } else {
                showNotification('网络已断开，数据将保存在本地', 'warn');
            }
        }

        // 更新连接状态显示
        function updateConnectionStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (isOnline) {
                dot.className = 'status-dot';
                text.textContent = '在线';
            } else {
                dot.className = 'status-dot offline';
                text.textContent = '离线';
            }
        }

        // 同步数据
        async function syncData() {
            if (!currentUser) {
                showNotification('请先登录', 'error');
                return;
            }
            
            if (!isOnline) {
                showNotification('当前处于离线模式，数据已保存到本地', 'warn');
                return;
            }

            if (syncInProgress) {
                showNotification('同步正在进行中...', 'info');
                return;
            }

            syncInProgress = true;
            showNotification('正在同步数据...', 'info');

            try {
                if (APP_CONFIG.mockSync) {
                    // 模拟同步过程
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    lastSyncTime = new Date();
                    document.getElementById('lastSyncTime').textContent = 
                        `同步于: ${formatDateTime(lastSyncTime)}`;
                    showNotification('数据同步完成', 'success');
                } else {
                    // 实际同步请求
                    const response = await fetch(APP_CONFIG.syncUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${currentUser.token}` // 如果服务器需要认证
                        },
                        body: JSON.stringify({
                            products: products,
                            productFiles: productFiles,
                            historyRecords: historyRecords,
                            timestamp: Date.now(),
                            userId: currentUser.id
                        })
                    });

                    if (response.ok) {
                        const result = await response.json();
                        // 如果服务器返回了更新的数据，合并到本地
                        if (result.products && Array.isArray(result.products)) {
                            mergeRemoteData(result.products, result.productFiles || {}, result.historyRecords || []);
                        }
                        
                        lastSyncTime = new Date();
                        document.getElementById('lastSyncTime').textContent = 
                            `同步于: ${formatDateTime(lastSyncTime)}`;
                        showNotification('数据同步成功', 'success');
                    } else {
                        throw new Error(`同步失败: ${response.status}`);
                    }
                }
            } catch (error) {
                console.error('同步失败:', error);
                showNotification('同步失败，数据已保存到本地', 'error');
            } finally {
                syncInProgress = false;
            }
        }

        // 合并远程数据
        function mergeRemoteData(remoteProducts, remoteFiles, remoteHistory) {
            const localMap = new Map(products.map(p => [p.model, p]));
            const remoteMap = new Map(remoteProducts.map(p => [p.model, p]));
            
            // 合并产品数据
            const mergedProducts = [];
            const processedModels = new Set();
            
            // 先添加远程数据
            remoteProducts.forEach(remoteProduct => {
                const localProduct = localMap.get(remoteProduct.model);
                if (localProduct) {
                    // 如果本地数据更新，则保留本地数据
                    const localTime = new Date(localProduct.lastModified || 0).getTime();
                    const remoteTime = new Date(remoteProduct.lastModified || 0).getTime();
                    
                    if (localTime > remoteTime) {
                        mergedProducts.push(localProduct);
                    } else {
                        mergedProducts.push(remoteProduct);
                    }
                } else {
                    mergedProducts.push(remoteProduct);
                }
                processedModels.add(remoteProduct.model);
            });
            
            // 添加本地独有数据
            products.forEach(localProduct => {
                if (!processedModels.has(localProduct.model)) {
                    mergedProducts.push(localProduct);
                }
            });
            
            products = mergedProducts;
            
            // 合并文件数据
            Object.assign(productFiles, remoteFiles);
            
            // 合并历史记录
            historyRecords = [...remoteHistory, ...historyRecords];
            // 去重并排序
            const uniqueHistory = {};
            historyRecords.forEach(record => {
                uniqueHistory[record.id] = record;
            });
            historyRecords = Object.values(uniqueHistory).sort((a, b) => 
                new Date(b.timestamp) - new Date(a.timestamp)
            );
            
            saveLocalData();
            renderList();
            renderSel();
            renderFileProductSelector();
            renderHistoryProductSelector();
            renderHistoryList();
        }

        // 格式化日期时间
        function formatDateTime(date) {
            return date.toLocaleString('zh-CN', { 
                year: 'numeric',

                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (document.body.contains(notification)) {
                    notification.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
                    notification.style.transform = 'translateX(100%)';
                    notification.style.opacity = '0';
                    
                    setTimeout(() => {
                        if (document.body.contains(notification)) {
                            document.body.removeChild(notification);
                        }
                    }, 300);
                }

        }

        // 自动计算包装信息
        function autoCalc() {
            let l1 = parseFloat(document.getElementById('l1').value) || 0;
            let w1 = parseFloat(document.getElementById('w1').value) || 0;
            let h1 = parseFloat(document.getElementById('h1').value) || 0;
            
            let l2 = parseFloat(document.getElementById('l2').value) || 0;
            let w2 = parseFloat(document.getElementById('w2').value) || 0;
            let h2 = parseFloat(document.getElementById('h2').value) || 0;
            
            let c1 = (l1 * w1 * h1) / 1000000;
            let o1 = (l1 * w1 * h1) / 5000;
            let a1 = (l1 * w1 * h1) / 6000;
            let e1 = (l1 * w1 * h1) / 5000;
            
            let c2 = (l2 * w2 * h2) / 1000000;
            let o2 = (l2 * w2 * h2) / 5000;
            let a2 = (l2 * w2 * h2) / 6000;
            let e2 = (l2 * w2 * h2) / 5000;
            
            let infoHtml = '包装1：';
            if (l1 && w1 && h1) {
                infoHtml += `海派${o1.toFixed(2)}kg 空派${a1.toFixed(2)}kg 快递${e1.toFixed(2)}kg CBM${c1.toFixed(3)}`;
            } else {
                infoHtml += '待输入';
            }
            
            if (l2 && w2 && h2) {
                infoHtml += ` | 包装2：海派${o2.toFixed(2)}kg 空派${a2.toFixed(2)}kg 快递${e2.toFixed(2)}kg CBM${c2.toFixed(3)}`;
            }
            
            document.getElementById('autoInfo').innerHTML = infoHtml;
        }

        // 保存产品
        function saveProduct() {
            let model = document.getElementById('model').value.trim();
            let l1 = parseFloat(document.getElementById('l1').value) || 0;
            let w1 = parseFloat(document.getElementById('w1').value) || 0;
            let h1 = parseFloat(document.getElementById('h1').value) || 0;
            let weight1 = parseFloat(document.getElementById('weight1').value) || 0;
            
            let l2 = parseFloat(document.getElementById('l2').value) || 0;
            let w2 = parseFloat(document.getElementById('w2').value) || 0;
            let h2 = parseFloat(document.getElementById('h2').value) || 0;
            let weight2 = parseFloat(document.getElementById('weight2').value) || 0;
            
            let intro = document.getElementById('intro').value.trim();
            
            if (!model || !l1 || !w1 || !h1 || !weight1) {
                showNotification('请填写完整的产品信息', 'error');
                return;
            }
            
            // 计算包装参数
            let p1 = {
                ocean: (l1 * w1 * h1) / 5000,
                air: (l1 * w1 * h1) / 6000,
                exp: (l1 * w1 * h1) / 5000,
                cbm: (l1 * w1 * h1) / 1000000
            };
            
            let p2 = {
                ocean: (l2 * w2 * h2) / 5000,
                air: (l2 * w2 * h2) / 6000,
                exp: (l2 * w2 * h2) / 5000,
                cbm: (l2 * w2 * h2) / 1000000
            };
            
            let newItem = {
                model: model,
                l1: l1, w1: w1, h1: h1, weight1: weight1,
                l2: l2, w2: w2, h2: h2, weight2: weight2,
                intro: intro,
                p1: p1,
                p2: p2,
                lastModified: new Date().toISOString()
            };
            
            let index = products.findIndex(item => item.model === model);
            if (index > -1) {
                const oldProduct = {...products[index]};
                products[index] = newItem;
                recordHistory('update', newItem, { previousData: oldProduct });
                showNotification('产品已更新');
            } else {
                products.push(newItem);
                recordHistory('create', newItem);
                showNotification('产品保存成功');
            }
            
            saveLocalData();
            renderList();
            renderSel();
            renderFileProductSelector();
            renderHistoryProductSelector();
            
            // 清空表单
            document.getElementById('model').value = '';
            document.getElementById('l1').value = '';
            document.getElementById('w1').value = '';
            document.getElementById('h1').value = '';
            document.getElementById('weight1').value = '';
            document.getElementById('l2').value = '';
            document.getElementById('w2').value = '';
            document.getElementById('h2').value = '';
            document.getElementById('weight2').value = '';
            document.getElementById('intro').value = '';
            autoCalc();
            
            // 自动同步
            setTimeout(syncData, 1000);
        }

        // 计算总重量
        function calTotalWeight() {
            let model = document.getElementById('selModel').value;
            let qty = parseInt(document.getElementById('qty').value) || 1;
            
            let product = products.find(item => item.model === model);
            if (!product) return;
            
            let single = (product.weight1 || 0) + (product.weight2 || 0);
            let total = single * qty;
            
            document.getElementById('totalWeightTip').innerText = 
                `货物总重量：${total.toFixed(2)}kg (${product.weight1 || 0}+${product.weight2 || 0}) × ${qty}`;
        }

        // 生成报价
        function makeQuote() {
            let model = document.getElementById('selModel').value;
            let qty = parseInt(document.getElementById('qty').value) || 1;
            let unit = parseFloat(document.getElementById('unitPrice').value) || 0;
            let freightUnit = parseFloat(document.getElementById('freightUnit').value) || 0;
            let overFee = parseFloat(document.getElementById('overFee').value) || 0;
            let remoteFee = parseFloat(document.getElementById('remoteFee').value) || 0;
            let customFee = parseFloat(document.getElementById('customFee').value) || 0;
            let method = document.getElementById('shipMethod').value;
            let time = document.getElementById('shipTime').value;
            
            let product = products.find(item => item.model === model);
            if (!product) {
                showNotification('请选择产品', 'error');
                return;
            }
            
            let w1 = product.weight1 || 0;
            let w2 = product.weight2 || 0;
            
            let v1 = method === 'ocean' ? product.p1.ocean : 
                     method === 'air' ? product.p1.air : product.p1.exp;
            let v2 = method === 'ocean' ? product.p2.ocean : 
                     method === 'air' ? product.p2.air : product.p2.exp;
            
            let c1 = Math.max(w1, v1);
            let c2 = Math.max(w2, v2);
            let totalChargeableWeight = c1 + c2;
            
            let freight = (totalChargeableWeight * freightUnit * qty + overFee + remoteFee + customFee) * 1.1 / 6.8;
            let productTotal = unit * qty;
            let total = productTotal + freight;
            
            let calc = `1. 包装1计费重：max(${w1}, ${v1.toFixed(2)}) = ${c1.toFixed(2)}kg
2. 包装2计费重：max(${w2}, ${v2.toFixed(2)}) = ${c2.toFixed(2)}kg
3. 总计费重：${totalChargeableWeight.toFixed(2)}kg
4. 运费 = (${totalChargeableWeight.toFixed(2)}×${freightUnit}×${qty}+${overFee}+${remoteFee}+${customFee})×1.1÷6.8 = ${freight.toFixed(2)}USD
5. 产品总价 = ${unit}×${qty} = ${productTotal.toFixed(2)}USD
6. 总报价 = ${productTotal.toFixed(2)}+${freight.toFixed(2)} = ${total.toFixed(2)}USD`;
            
            document.getElementById('calcProcess').innerText = calc;
            
            let quote = `${product.model} - ${product.intro || 'No description'}

Unit Price: ${unit.toFixed(2)} USD
Quantity: ${qty}
Freight Cost: ${freight.toFixed(2)} USD
Shipping Method: ${method === 'ocean' ? 'Ocean Freight' : method === 'air' ? 'Air Freight' : 'Express'}
Shipping Time: ${time || 'TBD'}

Total Amount: ${total.toFixed(2)} USD
Calculation: (${unit}×${qty}) + ((${totalChargeableWeight.toFixed(2)}×${freightUnit}×${qty}+${overFee}+${remoteFee}+${customFee})×1.1÷6.8) = ${total.toFixed(2)} USD`;
            
            document.getElementById('quoteResult').innerText = quote;
        }

        // 降级复制方案
        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            textArea.style.top = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showNotification('报价已复制到剪贴板');
                } else {
                    showNotification('复制失败', 'error');
                }
            } catch (err) {
                showNotification('复制失败', 'error');
            }
            
            document.body.removeChild(textArea);
        }

        // 渲染文件列表

                fileList.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无文件</div>';
                return;
            }
            
            let html = '';
            files.forEach((file, index) => {
                let icon = '📄'; // 默认文档图标
                if (file.type.startsWith('image/')) {
                    icon = '🖼️';
                } else if (file.type.includes('pdf')) {
                    icon = '📕';
                } else if (file.type.includes('word') || file.name.endsWith('.doc') || file.name.endsWith('.docx')) {
                    icon = '📝';
                } else if (file.type.includes('excel') || file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
                    icon = '📊';
                } else if (file.type.includes('powerpoint') || file.name.endsWith('.ppt') || file.name.endsWith('.pptx')) {
                    icon = '📽️';
                }
                
                html += `
                    <div class="file-item">
                        <div class="file-preview">
                            <div class="file-icon">${icon}</div>
                            <div class="file-info">
                                <div class="file-name">${file.name}</div>
                                <div class="file-meta">${formatFileSize(file.size)} • ${formatDateTime(new Date(file.uploadTime))}</div>
                            </div>
                        </div>
                        <div>
                            <button class="btn btn-primary" style="padding:6px 10px;font-size:12px;" onclick="downloadFile('${model}', ${index})">📥 下载</button>
                            <button class="btn btn-danger" style="padding:6px 10px;font-size:12px;" onclick="deleteFile('${model}', ${index})">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            });
            
            fileList.innerHTML = html;
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 设置文件拖拽上传
        function setupFileDragDrop() {
            const dropZone = document.getElementById('dropZone');
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            
            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                
                if (e.dataTransfer.files.length) {
                    handleFiles(e.dataTransfer.files);
                }
            });
        }

        // 处理文件选择
        function handleFileSelect(event) {
            const files = event.target.files;
            handleFiles(files);
            // 重置input以允许再次选择相同文件
            event.target.value = '';
        }

        // 处理文件
        function handleFiles(files) {
            const selectedModel = document.getElementById('selFileProduct').value;
            if (!selectedModel) {
                showNotification('请先选择产品', 'error');
                return;
            }
            
            const validFiles = Array.from(files).filter(file => {
                if (file.size > APP_CONFIG.maxFileSize) {
                    showNotification(`文件 ${file.name} 超过最大限制 ${formatFileSize(APP_CONFIG.maxFileSize)}`, 'error');
                    return false;
                }
                
                // 检查文件类型
                const isValidType = APP_CONFIG.allowedFileTypes.some(type => {
                    if (type.startsWith('.')) {
                        return file.name.toLowerCase().endsWith(type);
                    } else if (type.endsWith('/*')) {
                        return file.type.startsWith(type.slice(0, -1));
                    } else {
                        return file.type.includes(type);
                    }
                });
                
                if (!isValidType) {
                    showNotification(`文件 ${file.name} 类型不被支持`, 'error');
                    return false;
                }
                
                return true;
            });
            
            if (validFiles.length === 0) {
                return;
            }
            
            // 将文件添加到产品
            addFilesToProduct(selectedModel, validFiles);
        }

        // 将文件添加到产品
        function addFilesToProduct(model, files) {
            if (!productFiles[model]) {
                productFiles[model] = [];
            }
            
            files.forEach(file => {
                const fileInfo = {
                    id: Date.now() + Math.random(),
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    uploadTime: new Date().toISOString(),
                    // 在实际应用中，这里应该将文件上传到服务器
                    // 这里我们只是存储文件信息，实际文件需要通过其他方式管理
                };
                
                productFiles[model].push(fileInfo);
            });
            
            saveLocalData();
            renderFileList(model);
            showNotification(`成功添加 ${files.length} 个文件`);
        }

        // 下载文件
        function downloadFile(model, index) {
            const file = productFiles[model][index];
            showNotification(`下载功能需在实际部署环境中使用，当前仅演示界面`, 'info');
            // 在实际应用中，这里应该是从服务器下载文件
            // 或者如果是小文件可以直接从localStorage下载
        }

        // 删除文件
        function deleteFile(model, index) {
            if (confirm('确定要删除这个文件吗？')) {
                productFiles[model].splice(index, 1);
                
                // 如果产品没有文件了，删除该产品的文件记录
                if (productFiles[model].length === 0) {
                    delete productFiles[model];
                }
                
                saveLocalData();
                renderFileList(model);
                showNotification('文件已删除');
            }
        }

        // 查看产品资料
        function viewProductFiles(model) {
            // 切换到资料管理标签页
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector('.tab[data-tab="files"]').classList.add('active');
            document.getElementById('files').classList.add('active');
            
            // 选择对应的产品
            document.getElementById('selFileProduct').value = model;
            loadProductFiles();
        }

        // ==================== 新增功能：历史记录管理 ====================
        
        // 渲染历史记录产品选择器
        function renderHistoryProductSelector() {
            let sel = document.getElementById('historyFilterProduct');
            sel.innerHTML = '<option value="">全部产品</option>' + 
                           products.map(product => 
                               `<option value="${product.model}">${product.model}</option>`
                           ).join('');
        }

        // 渲染历史记录列表
        function renderHistoryList() {
            const list = document.getElementById('historyList');
            const filterType = document.getElementById('historyFilterType').value;
            const filterProduct = document.getElementById('historyFilterProduct').value;
            
            let filteredHistory = [...historyRecords];
            
            if (filterType) {
                filteredHistory = filteredHistory.filter(record => record.action === filterType);
            }
            
            if (filterProduct) {
                filteredHistory = filteredHistory.filter(record => record.productData.model === filterProduct);
            }
            
            if (filteredHistory.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无历史记录</div>';
                return;
            }
            
            let html = '';
            filteredHistory.forEach(record => {
                const actionClass = `action-${record.action}`;
                const actionText = record.action === 'create' ? '创建' : 
                                  record.action === 'update' ? '更新' : '删除';
                
                html += `
                    <div class="history-item">
                        <div class="history-header">
                            <div>
                                <span class="history-action ${actionClass}">${actionText}</span>
                                <strong>${record.productData.model}</strong>
                            </div>
                            <div class="history-time">${formatDateTime(new Date(record.timestamp))}</div>
                        </div>
                        <div class="history-data">
                            ${record.action === 'update' && record.previousData ? 
                              `从: ${JSON.stringify(record.previousData)}<br/>到: ${JSON.stringify(record.productData)}` :
                              JSON.stringify(record.productData)}
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        // 过滤历史记录
        function filterHistory() {
            renderHistoryList();
        }

        // 页面加载完成后初始化
        window.onload = initApp;

        // 页面卸载前同步数据
        window.addEventListener('beforeunload', (e) => {
            if (syncInProgress) {
                e.preventDefault();
                e.returnValue = '同步正在进行中，确定要离开吗？';
            }
        });
    </script>
</body>
</html>
